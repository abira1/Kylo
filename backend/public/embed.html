<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>KYLO Chat Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        #root {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }

        .kylo-header {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .kylo-header-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
        }

        .kylo-close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
        }

        .kylo-close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .kylo-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f9fafb;
        }

        .kylo-message {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease;
        }

        .kylo-message.user {
            justify-content: flex-end;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .kylo-message-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            max-width: 85%;
            word-wrap: break-word;
        }

        .kylo-message.assistant .kylo-message-bubble {
            background: #e0e7ff;
            color: #1f2937;
        }

        .kylo-message.user .kylo-message-bubble {
            background: #6366f1;
            color: white;
        }

        .kylo-input-area {
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
            background: white;
            display: flex;
            gap: 8px;
        }

        .kylo-input {
            flex: 1;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .kylo-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .kylo-send-btn {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            font-size: 14px;
        }

        .kylo-send-btn:hover {
            background: #4f46e5;
        }

        .kylo-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .kylo-loading {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 10px 14px;
        }

        .kylo-loading span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6366f1;
            animation: blink 1.4s infinite;
        }

        .kylo-loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .kylo-loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .kylo-welcome {
            text-align: center;
            padding: 24px 16px;
            color: #6b7280;
        }

        .kylo-welcome-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .kylo-welcome-text {
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="kylo-header">
            <span class="kylo-header-title" id="agentName">Chat Assistant</span>
            <button class="kylo-close-btn" onclick="closeWidget()" aria-label="Close chat">✕</button>
        </div>

        <div class="kylo-messages" id="messagesContainer">
            <div class="kylo-welcome">
                <div class="kylo-welcome-title">Welcome!</div>
                <div class="kylo-welcome-text">How can we help you today?</div>
            </div>
        </div>

        <div class="kylo-input-area">
            <input
                type="text"
                class="kylo-input"
                id="messageInput"
                placeholder="Type your message..."
                onkeypress="handleKeyPress(event)"
                autocomplete="off"
            />
            <button class="kylo-send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message">Send</button>
        </div>
    </div>

    <script>
        // Get URL parameters
        const params = new URLSearchParams(window.location.search);
        const publicKey = params.get('publicKey');
        const agentName = params.get('agent') || 'Chat Assistant';

        // Set agent name
        document.getElementById('agentName').textContent = agentName;

        // State
        let messages = [];
        let conversationId = null;
        let isLoading = false;

        // Get API base from parent window or use default
        // Make it a var to ensure it's accessible in all scopes
        var API_BASE = (window.parent.KYLO_CONFIG && window.parent.KYLO_CONFIG.apiBase) || 'https://kylo-production.up.railway.app';

        console.log('[KYLO Embed] Initialized with:', { publicKey, agentName, API_BASE });

        // Notify parent that embed is ready
        window.parent.postMessage({ type: 'kylo:ready' }, '*');

        /**
         * Close widget
         */
        function closeWidget() {
            window.parent.postMessage({ type: 'kylo:close' }, '*');
        }

        /**
         * Send message
         */
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isLoading) return;

            // Add user message to UI
            addMessage(message, 'user');
            input.value = '';

            // Show loading state
            isLoading = true;
            showLoading();

            try {
                // Add user message to messages array for Claude
                messages.push({
                    role: 'user',
                    content: message
                });

                // Send to backend
                const apiUrl = `${API_BASE}/api/chat`;
                const payload = {
                    publicKey: publicKey,
                    message: message,
                    conversationId: conversationId || 'new',
                    messages: messages
                };
                
                console.log('[KYLO Embed] Sending to:', apiUrl);
                console.log('[KYLO Embed] Payload:', payload);
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                console.log('[KYLO Embed] Response status:', response.status, response.statusText);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.log('[KYLO Embed] Error response:', errorText);
                    throw new Error(`API error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                console.log('[KYLO Embed] Response data:', data);

                // Update conversation ID
                if (!conversationId && data.conversationId) {
                    conversationId = data.conversationId;
                }

                // Add assistant response
                if (data.reply) {
                    addMessage(data.reply, 'assistant');
                }
            } catch (err) {
                console.error('[KYLO Embed] Error:', err);
                addMessage('Sorry, I encountered an error. Please try again.', 'assistant');
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        /**
         * Add message to UI
         */
        function addMessage(text, role) {
            const container = document.getElementById('messagesContainer');

            // Remove welcome message on first message
            const welcome = container.querySelector('.kylo-welcome');
            if (welcome) welcome.remove();

            // Create message element
            const msgDiv = document.createElement('div');
            msgDiv.className = `kylo-message ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'kylo-message-bubble';
            bubble.textContent = text;

            msgDiv.appendChild(bubble);
            container.appendChild(msgDiv);

            // Store in memory
            messages.push({ role, content: text });

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        /**
         * Show loading indicator
         */
        function showLoading() {
            const container = document.getElementById('messagesContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'kylo-message assistant';
            loadingDiv.innerHTML = `
                <div class="kylo-message-bubble">
                    <div class="kylo-loading">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            loadingDiv.id = 'loading-indicator';
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
        }

        /**
         * Handle Enter key
         */
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Enable/disable send button based on input
        document.getElementById('messageInput').addEventListener('input', (e) => {
            document.getElementById('sendBtn').disabled = !e.target.value.trim();
        });

        // Focus input on load
        window.addEventListener('load', () => {
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
